name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: roomtalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d roomtalk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: server
    env:
      ROOM_EVENT_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/roomtalk_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      # The room-event suite must not silently skip in CI: the service database
      # above supplies the URL used by trigger, transaction, and NOTIFY tests.
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-heroui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18
          cache: npm
          cache-dependency-path: client-heroui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
