name: roomtalk

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: roomtalk-local:dev
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${ROOMTALK_APP_ENV_FILE:-.env.compose}
    environment:
      NODE_ENV: production
      PORT: "3012"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3012}
      CLIENT_URLS: ${CLIENT_URLS:-http://localhost:3012}
      PERSISTENCE_STORE: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-roomtalk}:${POSTGRES_PASSWORD:-roomtalk-local-only}@postgres:5432/${POSTGRES_DB:-message_system}
      POSTGRES_SSL: "false"
      REDIS_URL: redis://redis:6379
      MEDIA_STORAGE_MODE: s3
      MEDIA_BUCKET_NAME: ${MEDIA_BUCKET_NAME:-roomtalk-media}
      MEDIA_STORAGE_REGION: ${MEDIA_STORAGE_REGION:-us-east-1}
      MEDIA_STORAGE_ENDPOINT: http://object-storage:8333
      MEDIA_STORAGE_PUBLIC_ENDPOINT: ${MEDIA_STORAGE_PUBLIC_ENDPOINT:-}
      MEDIA_STORAGE_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${LOCAL_S3_ACCESS_KEY_ID:-roomtalk-local-access-key}
      AWS_SECRET_ACCESS_KEY: ${LOCAL_S3_SECRET_ACCESS_KEY:-roomtalk-local-secret-key}
      CODE_AGENT_ENABLED: ${CODE_AGENT_ENABLED:-false}
      CODEX_CONNECTIONS_ENABLED: ${CODEX_CONNECTIONS_ENABLED:-false}
      GITHUB_CONNECTIONS_ENABLED: ${GITHUB_CONNECTIONS_ENABLED:-false}
    ports:
      - 127.0.0.1:${ROOMTALK_PORT:-3012}:3012
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3012/api/status"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - roomtalk

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-message_system}
      POSTGRES_USER: ${POSTGRES_USER:-roomtalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomtalk-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${POSTGRES_HOST_PORT:-54329}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roomtalk} -d ${POSTGRES_DB:-message_system}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - roomtalk

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - 127.0.0.1:${REDIS_HOST_PORT:-63799}:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - roomtalk

  object-storage:
    image: chrislusf/seaweedfs:4.29@sha256:d47c7ee99fcb951351d7194915f4e3a5ea604a8e8871183d713907dec4fb9bf5
    restart: unless-stopped
    logging: *default-logging
    command: ["mini", "-dir=/data", "-s3.allowedOrigins=${CLIENT_URL:-http://localhost:3012}"]
    environment:
      AWS_ACCESS_KEY_ID: ${LOCAL_S3_ACCESS_KEY_ID:-roomtalk-local-access-key}
      AWS_SECRET_ACCESS_KEY: ${LOCAL_S3_SECRET_ACCESS_KEY:-roomtalk-local-secret-key}
      S3_BUCKET: ${MEDIA_BUCKET_NAME:-roomtalk-media}
    volumes:
      - ${ROOMTALK_OBJECT_STORAGE_HOST_PATH:-./runtime/object-storage}:/data
    ports:
      - 127.0.0.1:${LOCAL_S3_HOST_PORT:-8333}:8333
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - roomtalk

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    profiles: ["edge"]
    restart: unless-stopped
    logging: *default-logging
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/config.yml", "run"]
    volumes:
      - ${CLOUDFLARE_TUNNEL_CONFIG_FILE:-./runtime/cloudflared/config.yml}:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARE_TUNNEL_CREDENTIALS_FILE:-./runtime/cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - roomtalk

  postgres-backup:
    image: postgres:17-alpine
    profiles: ["ops"]
    env_file:
      - .env.compose
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-message_system}
      PGUSER: ${POSTGRES_USER:-roomtalk}
      PGPASSWORD: ${POSTGRES_PASSWORD:-roomtalk-local-only}
    volumes:
      - ./backups:/backups
      - ${ROOMTALK_OBJECT_STORAGE_HOST_PATH:-./runtime/object-storage}:/object-storage:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        umask 077
        timestamp="$${ROOMTALK_BACKUP_TIMESTAMP:-$$(date -u +%Y%m%dT%H%M%SZ)}"
        pg_dump --format=custom --file="/backups/roomtalk-$${timestamp}.dump"
        tar -czf "/backups/roomtalk-object-storage-$${timestamp}.tar.gz" -C /object-storage .
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - roomtalk

volumes:
  postgres_data:

networks:
  roomtalk:
    driver: bridge
